                <form class="input-form" action="https://formspree.io/f/xyknvvpw" method="POST">

                    <input type="text" id="fname" name="firstname" placeholder="Your first name">

                    <input type="text" id="lname" name="lastname" placeholder="Your last name">
    
                    <label for="email">Email address</label>
                    <input type="email" id="email" name="emailaddress" placeholder="Your email address">
    
                    <label for="message">Leave a message</label>
                    <textarea id="message" name="message" placeholder="Leave a message..." style="height: 100px; font-family: Ubuntu;"></textarea>

                    <button type="submit">Submit</button>
                </form>
